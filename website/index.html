      <div style="max-width:800px;margin:0 auto;padding:4rem 2rem;font-family:system-ui,sans-serif;color:#ededed;background:#0a0a0a;">
        <h1>agentmarkup - machine-readable websites for Vite and Astro</h1>
        <p>Generate llms.txt, inject schema.org JSON-LD, create markdown mirrors from final HTML, manage AI crawler robots.txt rules, patch Content-Signal headers, and validate everything at build time. Zero runtime cost.</p>
        <p><strong>Install:</strong> <code>pnpm add -D @agentmarkup/vite</code> or <code>pnpm add -D @agentmarkup/astro</code></p>
        <h2>Features</h2>
        <ul>
          <li><strong>llms.txt generation</strong> - Auto-generate an llms.txt file following the llmstxt.org spec.</li>
          <li><strong>JSON-LD structured data injection</strong> - Inject schema.org JSON-LD into every page with XSS-safe serialization. 6 built-in presets.</li>
          <li><strong>AI crawler robots.txt management</strong> - Allow or block GPTBot, ClaudeBot, PerplexityBot, Google-Extended, CCBot.</li>
          <li><strong>Markdown mirrors</strong> - Generate cleaned <code>.md</code> companions for built pages so fetch-based agents can read the content directly.</li>
          <li><strong>Content-Signal headers</strong> - Patch a host-friendly <code>_headers</code> file with forward-looking AI directives.</li>
          <li><strong>Final-output validation</strong> - Catch missing fields, incomplete schemas, thin HTML, and crawler conflicts before you deploy.</li>
        </ul>
        <h2>Schema.org presets</h2>
        <p>webSite, organization, article, faqPage, product, offer</p>
